# Disabled sidecar candidate. Integrate these locations into the existing HTTPS
# server only after backend acceptance; do not replace certificate directives.
server {
    listen 127.0.0.1:8081;
    server_name _;
    root /opt/manufacturing-graph-explorer/current/dist;
    index index.html;

    location ~ ^/api/agent/runs/[^/]+/events$ {
        proxy_pass http://127.0.0.1:4175;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4175;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ /\.(?:git|data|env) { deny all; }
    location ~* ^/(?:etc|secrets|source-sync|packages/demo-data/documents)/ { deny all; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
