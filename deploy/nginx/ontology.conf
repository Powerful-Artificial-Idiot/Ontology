server {
    listen 80;
    listen [::]:80;
    server_name 139.196.109.86;

    root /var/www/ontology/current;
    index index.html;
    autoindex off;
    charset utf-8;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /index.html {
        expires -1;
        try_files /index.html =404;
    }

    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }

    location ~* \.(?:env|map|pem|key)$ {
        deny all;
    }

    location ~* \.(?:css|js|mjs|woff2?|png|jpe?g|gif|svg|ico)$ {
        expires 1y;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
