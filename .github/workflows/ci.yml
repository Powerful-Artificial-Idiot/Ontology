name: Knowledge Engineering CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: python -m pip install .
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run agent:evaluate
      - run: make validate PYTHON=python
      - run: npm run build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-evaluation-report
          path: .data/evaluations/latest-report.json
          if-no-files-found: error
