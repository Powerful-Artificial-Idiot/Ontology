name: Release Knowledge Assets

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: python -m pip install .
      - run: make build PYTHON=python
      - uses: actions/upload-artifact@v4
        with:
          name: enterprise-knowledge-release-${{ github.ref_name }}
          path: dist/
