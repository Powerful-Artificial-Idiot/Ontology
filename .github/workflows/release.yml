name: Release Knowledge Assets

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: python -m pip install .
      - run: make build PYTHON=python
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-evaluation-report-${{ github.ref_name }}
          path: .data/evaluations/latest-report.json
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: source-sync-release-report-${{ github.ref_name }}
          path: |
            .data/source-sync/fixture-live-report.json
            .data/source-sync/phase5d-formal-report.json
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: enterprise-knowledge-release-${{ github.ref_name }}
          path: dist/
